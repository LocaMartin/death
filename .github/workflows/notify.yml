name: TeleHub Push Notifier

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    permissions:
      contents: write     # < REQUIRED to allow git push

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python send.py

      - name: Commit & push updated scope files
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          git add res out            # commit both directories if you want
          git commit -m "Auto Update scopes & merged targets" || echo "No changes"
          git push

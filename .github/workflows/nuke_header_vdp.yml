name: Nuclei Header VDP

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * *" # Runs every day at 3 AM UTC"
  push:
    paths:
      - "out/**"

jobs:
  nuclei:
    if: github.actor != 'github-actions'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Nuclei
        run: |
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Update Nuclei Templates
        run: nuclei -update-templates

      - name: Send Notification to Telegram
        env: 
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
          -d "chat_id=${CHAT_ID}" \
          -d "text=Starting Nuclei header-based scan. Total domains: $(wc -l < out/vdp/domains.txt)" 

      - name: Run Header-Based Templates
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          nuclei \
            -l out/vdp/domains.txt \
            -t http/vulnerabilities/generic/oob-header-based-interaction.yaml,http/vulnerabilities/generic/host-header-injection.yaml \
            -nh -silent | tee header.log | while read -r line; do
              curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                -H "Content-Type: application/json" \
                -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"[vdp]$line\"}" -o /dev/null
          done

      - name: Commit Results
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          git add header.log
          git commit -m "Auto update: Nuclei header scan results" || echo "No changes"
          git push

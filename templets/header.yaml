id: header-test
info:
  name: Header Based Injection Test
  author: loca
  severity: critical
  tags: rce,header,test
# oob
http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
        {{header}}: {{interactsh-url}}

    payloads:
      - headers: payloads/headers.txt   

    matchers-condition: or
    matchers:
      - type: word
        part: interactsh_protocol
        name: http
        words:
          - "http"

      - type: word
        part: interactsh_protocol
        name: dns
        words:
          - "dns" 

extractors: 
  - type: regex
    name: header
    part: header
    regex:
      - {{header}}: (.*)

# command injection

http:
  - raw:
      - |
        GET /?{{header}} HTTP/1.1
        Host: {{Hostname}}
        {{header}}: {{payload}}

    payloads:
      header: helpers/payloads/request-headers.txt
      payload: helpers/payloads/command-injection.txt
    attack: clusterbomb
    host-redirects: true
    stop-at-first-match: true

    matchers-condition: or
    matchers:
      - type: word
        words:
          - "uid="
          - "gid="
          - "groups="
        condition: and

      - type: regex
        regex:
          - "root:.*:0:0:"

# xss

http:
  - raw:
      - |
        GET /?{{header}}={{payload}} HTTP/1.1
        Host: {{Hostname}}
        {{header}}: {{payload}}

    payloads:
      header: payloads/headers.txt
      payload: helpers/payloads/xss.txt
    attack: clusterbomb
    host-redirects: true
    stop-at-first-match: true

    matchers-condition: or
    matchers:
      - type: word
        words:
          - "LocaMartin"
        condition: and

